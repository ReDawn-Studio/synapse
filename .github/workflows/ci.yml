name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Backend CI
  backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: synapse_test
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint || true
      
      - name: Build
        run: npm run build
      
      - name: Run tests
        run: npm test || true
        env:
          DATABASE_URL: postgres://synapse:synapse_test_password@localhost:5432/synapse_test
          JWT_SECRET: test-secret
          NODE_ENV: test

  # Frontend CI
  frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Lint
        working-directory: ./frontend
        run: npm run lint || true
      
      - name: Test
        working-directory: ./frontend
        run: npm test -- --run || true
      
      - name: Build
        working-directory: ./frontend
        run: npm run build

  # Docker build check
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build backend Docker image
        run: docker build -t synapse-api .
      
      - name: Build frontend Docker image
        run: docker build -t synapse-frontend ./frontend
